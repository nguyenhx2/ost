# CI - OST
# Enabled in TASK-004. Runs lint + unit tests + builds on every PR and push to main.
# Full Tauri bundling (MSI/NSIS) is NOT run here - it belongs to the gated release flow
# (devops agent, signing keys in Actions secrets only). cargo clippy compiles the crate,
# so the Rust build is covered; the frontend build is covered by `npm run build`.
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint + prettier)
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm run test
      - name: Frontend build (tsc + vite)
        run: npm run build
      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - name: Rust lint (clippy -D warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
